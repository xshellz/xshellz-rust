name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Token-based publish (CARGO_REGISTRY_TOKEN repo secret, canonical copy
      # in the infra xshellz-manage Pulumi config). Switch to crates.io OIDC
      # trusted publishing once the crate exists and is configured.
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
